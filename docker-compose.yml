# Docker Compose for UltraSinger (CLI mode)
#
# CPU usage (works everywhere):
#   docker compose run ultrasinger uv run python /app/UltraSinger/src/UltraSinger.py \
#       -i "https://www.youtube.com/watch?v=XXXXX" -o /app/UltraSinger/output/
#
# GPU usage (requires NVIDIA Container Toolkit):
#   docker compose --profile gpu run ultrasinger-gpu uv run python /app/UltraSinger/src/UltraSinger.py \
#       -i "https://www.youtube.com/watch?v=XXXXX" -o /app/UltraSinger/output/
#
# Convert a local file (place it in ./input/ first):
#   docker compose run ultrasinger uv run python /app/UltraSinger/src/UltraSinger.py \
#       -i /app/UltraSinger/input/song.mp3 -o /app/UltraSinger/output/

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./input:/app/UltraSinger/input
    - ./output:/app/UltraSinger/output
    - ./cookies.txt:/app/UltraSinger/cookies.txt:ro
  stdin_open: true
  tty: true

services:
  # CPU mode (default) — works without NVIDIA drivers
  ultrasinger:
    <<: *common

  # GPU mode — requires NVIDIA Container Toolkit
  ultrasinger-gpu:
    <<: *common
    profiles: [gpu]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
