name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # media_interceptor.py / queue_manager.py pull in PySide6 (QtWebEngineCore /
      # QtCore QObject subclasses); there is no X server on the runner, so force
      # the headless Qt platform plugin.
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt runtime libraries and ffmpeg
        # PySide6 (incl. QtWebEngine) needs these native libs even with the
        # offscreen platform plugin; without them the GUI test modules are
        # skipped (or used to break collection) instead of actually running.
        # ffmpeg: the metadata-writer round-trip tests invoke it for real.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg \
            libegl1 libgl1 libopengl0 libxkbcommon0 libxkbcommon-x11-0 \
            libnss3 libdbus-1-3 libdrm2 libgbm1 libasound2t64 \
            libxcomposite1 libxdamage1 libxrandr2 libxtst6 libxi6 \
            libxcursor1 libfontconfig1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        # pyproject.toml already pins the "pytorch" index to whl/cpu, so this
        # pulls CPU-only torch/torchaudio/torchvision wheels (no CUDA download).
        # --extra scoring: ultrastar-score ships a manylinux wheel on PyPI, so
        #   no build toolchain is needed; pulled in so pytest/modules/test_uscore_report.py
        #   and pytest/modules/Refinement/test_refine_from_vocal.py exercise the
        #   real code path instead of only the ImportError fail-open branch.
        # --extra gui: pytest/gui/test_media_interceptor.py and
        #   pytest/gui/test_queue_result_info.py import src/gui modules that
        #   depend on PySide6.
        run: uv sync --extra scoring --extra gui

      - name: Verify Qt imports (GUI tests must not silently skip)
        # The importorskip guards keep local no-gui environments green, but in
        # CI a silent skip would hide real coverage loss (CodeRabbit finding).
        # If these imports work here, the guards don't trigger and the GUI
        # tests genuinely run in the pytest step below.
        run: uv run python -c "import PySide6.QtWidgets, PySide6.QtWebEngineCore; print('Qt OK')"

      - name: Run pytest
        run: uv run pytest --import-mode=append -q pytest/
